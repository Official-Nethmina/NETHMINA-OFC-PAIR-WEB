<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NETHMINA OFC PAIR WEB</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
  <style>
body {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    background-image: url("https://i.ibb.co/jkSqYvmF/5823605-2920x1640-desktop-hd-boy-programmer-background-image.jpg"); /* Set the background image */
    background-repeat: no-repeat;
    background-position: center;
    background-size: cover;
    font-family: Arial, sans-serif;
}

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background-color: #141414;
      background-repeat: no-repeat;
      background-position: center;
      background-size: cover;
      font-family: 'Arial', sans-serif;
      color: #fff; /* Set the text color to white */
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .box {
      width: 300px;
      height: 330px;
      padding: 20px;
      position: relative;
      text-align: center;
      background-color: #020105c6; /* Update background color */
      border-radius: 10px;
      transform: perspective(1000px) rotateY(0deg);
      box-shadow: 0 0 20px rgba(104, 15, 199, 0.7);
      position: relative;
    }

    #text {
      color: #ffffff; /* Set the text color to black (#000) */
    }

    .input-container input {
      color: #ffffff; /* Set the text color to black (#000) */
    }

    .centered-text {
      color: #ffffff; /* Set the text color to black (#000) */
    }

    .input-container {
      display: flex;
      background: #f4f0f0; /* Update background color */
      border-radius: 1rem;
      padding: 0.3rem;
      gap: 0.3rem;
      max-width: 300px;
      width: 100%;
    }

    .input-container input {
      border-radius: 0.8rem 0 0 0.8rem;
      background: #ffffff; /* Update background color */
      width: 89%;
      flex-basis: 75%;
      padding: 1rem;
      border: none;
      border-left: 2px solid #fb6107; /* Update border color */
      color: #14c2ee; /* Set text color to light grey */
      transition: all 0.2s ease-in-out;
    }

    .input-container input:focus {
      border-left: 2px solid #4534ff;
      outline: none;
      box-shadow: inset 13px 13px 10px #ece5e5, inset -13px -13px 10px #ece5e5;
    }

    .input-container button {
      flex-basis: 25%;
      padding: 1rem;
      background: linear-gradient(135deg, #4a2d77 0%, #6404e1 100%); /* Update background color */
      font-weight: 900;
      letter-spacing: 0.3rem;
      text-transform: uppercase;
      color: rgb(255, 255, 255);
      border: none;
      width: 100%;
      border-radius: 0 1rem 1rem 0;
      transition: all 0.2s ease-in-out;
    }

    .input-container button:hover {
    background: linear-gradient(135deg, #6404e1 0%, #4a2d77 100%);
    color: rgb(248, 207, 22); /* Change text color on hover to red */
  }

    #waiting-message {
      color: #ffffff; /* Set text color to light grey */
      margin-top: 10px;
    }

    @media (max-width: 500px) {
      .input-container {
        flex-direction: column;
      }

      .input-container input {
        border-radius: 0.8rem;
      }

      .input-container button {
        padding: 1rem;
        border-radius: 0.8rem;
      }
    }

    .centered-text {
      text-align: center;
    }

    /* Add styles for the loading spinner */
    #loading-spinner {
      display: none;
      color: white;
      margin-top: 10px;
    }

    .fa-spinner {
      animation: spin 2s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="main">
      <div class="box" id="box">
        <div id="text">
          <i class="fa fa-user"></i>
          <p>
            <h3 class="centered-text">LINK WITH PHONE NUMBER</h3>
            <h5>NETHMINA OFC WA-BOT PAIR WEB</h5>
            <h6>🔢 Enter your number with country code.</h6>
            <div class="input-container">
              <input placeholder="+94760860835" type="text" id="number" name="" style="color: black; font-size: 20px;">
              <button id="submit">enter</button>
            </div>
           
            <!-- Add the loading spinner -->
            <div id="loading-spinner">
              <i class="fas fa-spinner fa-spin"></i>
            </div>
            <br>
            <br>
            <main id="pair"></main>
          </p>
        </div>
      </div>
    </div>
  </div>
  <script
  src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.0.0-alpha.1/axios.min.js"
  ></script>
  <script>
    let a = document.getElementById("pair");
    let b = document.getElementById("submit");
    let c = document.getElementById("number");
    let spinner = document.getElementById("loading-spinner");

    async function Copy() {
        let obj = document.getElementById("copy");
        let originalText = obj.innerHTML;
        let codeToCopy = obj.innerText.replace('CODE: ', '');
        
        await navigator.clipboard.writeText(codeToCopy);
        obj.innerText = "COPIED ✅";
        obj.style.color = "#2ecc71";
        
        setTimeout(() => {
            obj.innerHTML = originalText;
            obj.style.color = "red";
        }, 1500);
    }

    b.addEventListener("click", async (e) => {
        e.preventDefault();
        const rawNumber = c.value.replace(/[^0-9]/g, "");

        if (!rawNumber) {
            a.innerHTML = '<a style="color:red;font-weight:bold">❗ Enter your whatsapp number with country code.</a><br><br>';
            return;
        } 
        
        // ලංකාවේ අංක (94...) හෝ වෙනත් රටක අංකයක් දැයි බැලීමට අවම ඉලක්කම් 10ක් වත් තිබිය යුතුයි
        if (rawNumber.length < 10) {
            a.innerHTML = '<a style="color:red;font-weight:bold">❗ Invalid number format. Too short. ❌</a><br><br>';
            return;
        }

        // UI Updates
        spinner.style.display = "block";
        a.innerHTML = '<span style="color:white">Requesting code... Please wait.</span>';
        b.disabled = true;

        try {
            let { data } = await axios(`/code?number=${rawNumber}`);
            let code = data.code || "❗ Service Unavailable";
            
            if (code === "Service Unavailable") {
                a.innerHTML = '<a style="color:red;font-weight:bold">❗ Server Busy. Try again later.</a><br><br>';
            } else {
                a.innerHTML = '<font id="copy" onclick="Copy()" style="color:red;font-weight:bold; cursor:pointer;" size="5">CODE: <span style="color:white;font-weight:bold">' + code + '</span></font><br><br><br>';
            }
        } catch (err) {
            a.innerHTML = '<a style="color:red;font-weight:bold">❗ Error connecting to server.</a><br><br>';
        } finally {
            spinner.style.display = "none";
            b.disabled = false;
        }
    });
</script>
 </body>
</html>
